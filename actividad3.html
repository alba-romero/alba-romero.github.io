        background-color: #f4f6f8;
        margin: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    button {
        display: block;
        width: 200px;
        margin: 15px auto;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background-color: #4a90e2;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background-color: #357abd;
    }

    div[id^="contenedor-act"],
    div[id^="respuesta-act"] {
        background-color: white;
        border-radius: 10px;
        padding: 15px;
        margin: 10px auto;
        width: 60%;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input {
        display: block;
        width: 90%;
        margin: 10px auto;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    label {
        display: block;
        width: 90%;
        margin: 5px auto;
        font-weight: bold;
    }

    form button {
        width: 150px;
        margin: 10px auto;
    }

    p {
        margin: 5px 0;
    }
</style>
